name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: self-hosted

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore

    - name: Test
      run: dotnet test --no-build

    - name: Build Docker image
      run: docker build -t sebasperez581/proyecto-integrador-devops:${{ github.sha }} .

    - name: Login to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "sebasperez581" --password-stdin

    - name: Push image
      run: docker push sebasperez581/proyecto-integrador-devops:${{ github.sha }}

    # CD AUTOMÁTICO CON HELM
    - name: Deploy with Helm
      run: |
        helm upgrade --install proyecto-integrador-devops ./proyecto-integrador-devops \
          --set image.tag=${{ github.sha }}

    - name: Verify rollout
      run: kubectl rollout status deployment/proyecto-integrador-devops
